version: '3.4'

x-labels:
  &default-labels
  # constant (not $CI) so digests are reproducible across CI/local
  org.supernetworks.ci: "true"
  org.supernetworks.version: ${RELEASE_VERSION:-latest}${RELEASE_CHANNEL:-}

services:
  spr-tor:
    container_name: spr-tor
    image: ghcr.io/spr-networks/spr-tor:latest
    build:
      context: "${BUILDCTX:-.}"
      labels: *default-labels
    security_opt:
      - no-new-privileges:true
    # Tor is an outbound-only client (no relay, no tun device). NET_ADMIN is
    # needed only so the plugin can install the transparent-proxy nft REDIRECT
    # rules when TransPort is enabled; with TransPort off no rules are added.
    cap_add:
      - NET_ADMIN
    sysctls:
      # REDIRECT sends transit traffic to tor's TransPort on the container IP;
      # route_localnet keeps the rewritten packets deliverable.
      - net.ipv4.conf.all.route_localnet=1
    networks:
      tornet:
    volumes:
      - "${SUPERDIR}./state/plugins/spr-tor:/state/plugins/spr-tor"
      - "${SUPERDIR}./configs/base/config.sh:/configs/base/config.sh:ro"
      - "${SUPERDIR}./configs/plugins/spr-tor:/configs/spr-tor"

# Note, if updating the bridge name, also update gSPRTorInterface in
# code/tor_plugin.go and NetworkCapabilities.Interface in plugin.json.
networks:
  tornet:
    name: spr-tor
    driver_opts:
      com.docker.network.bridge.name: spr-tor
